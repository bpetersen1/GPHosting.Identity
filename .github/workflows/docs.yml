name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docfx/**'
      - 'docfx.json'
      - 'src/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Build API reference (DocFX)
        run: docfx docfx.json

      - name: Install docs site dependencies
        run: npm ci
        working-directory: website

      - name: Build docs site (Docusaurus)
        run: npm run build
        working-directory: website

      - name: Merge API reference into site output
        run: cp -r docfx/_site website/build/api-reference

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
