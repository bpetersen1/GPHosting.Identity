name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docfx/**'
      - 'docfx.json'
      - 'src/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Build API reference (DocFX)
        run: docfx docfx.json

      - name: Install docs site dependencies
        run: npm ci
        working-directory: website

      - name: Build docs site (Docusaurus)
        run: npm run build
        working-directory: website

      - name: Merge API reference into site output
        run: cp -r docfx/_site website/build/api-reference

      # Pushes the built site straight to the gh-pages branch. Requires Settings > Pages >
      # Source = "Deploy from a branch", branch gh-pages, folder / (root). Using this instead
      # of the actions/deploy-pages API-based deploy, which was unreliable for this repo
      # (intermittent "Timeout reached, aborting!" / "Deployment cancelled" failures with no
      # diagnosable cause on our end across multiple commits and config fixes).
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/build
