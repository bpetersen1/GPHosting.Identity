name: Publish

on:
  push:
    tags: ['v*.*.*']

env:
  DOTNET_NOLOGO: true

jobs:
  publish:
    name: Build, Test & Publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for NuGet Trusted Publishing (OIDC token exchange)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          dotnet build src/GPHosting.Identity/test/IdentityServer.UnitTests -c Release /p:Version=$VERSION
          dotnet build src/GPHosting.Identity/test/IdentityServer.IntegrationTests -c Release /p:Version=$VERSION
          dotnet build src/EntityFramework.Storage/test/UnitTests -c Release /p:Version=$VERSION
          dotnet build src/EntityFramework.Storage/test/IntegrationTests -c Release /p:Version=$VERSION
          dotnet build src/EntityFramework/test/GPHosting.Identity.EntityFramework.Tests -c Release /p:Version=$VERSION
          dotnet build src/AspNetIdentity/src/GPHosting.Identity.AspNetIdentity.csproj -c Release /p:Version=$VERSION

      - name: Test - Core (unit)
        run: dotnet test src/GPHosting.Identity/test/IdentityServer.UnitTests -c Release --no-build --logger "trx" --results-directory TestResults

      - name: Test - Core (integration)
        run: dotnet test src/GPHosting.Identity/test/IdentityServer.IntegrationTests -c Release --no-build --logger "trx" --results-directory TestResults

      - name: Test - EF Storage (unit)
        run: dotnet test src/EntityFramework.Storage/test/UnitTests -c Release --no-build --logger "trx" --results-directory TestResults

      - name: Test - EF Storage (integration)
        run: dotnet test src/EntityFramework.Storage/test/IntegrationTests -c Release --no-build --logger "trx" --results-directory TestResults

      - name: Test - EF
        run: dotnet test src/EntityFramework/test/GPHosting.Identity.EntityFramework.Tests -c Release --no-build --logger "trx" --results-directory TestResults

      - name: Pack
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          dotnet pack src/Storage/src/GPHosting.Identity.Storage.csproj -c Release --no-build -o ./nupkg /p:Version=$VERSION
          dotnet pack src/GPHosting.Identity/src/GPHosting.Identity.csproj -c Release --no-build -o ./nupkg /p:Version=$VERSION
          dotnet pack src/EntityFramework.Storage/src/GPHosting.Identity.EntityFramework.Storage.csproj -c Release --no-build -o ./nupkg /p:Version=$VERSION
          dotnet pack src/EntityFramework/src/GPHosting.Identity.EntityFramework.csproj -c Release --no-build -o ./nupkg /p:Version=$VERSION
          dotnet pack src/AspNetIdentity/src/GPHosting.Identity.AspNetIdentity.csproj -c Release --no-build -o ./nupkg /p:Version=$VERSION

      - name: NuGet login (OIDC → short-lived API key)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
